<!DOCTYPE html>
<!--
  wheel_overlay.html — The Wheel of Fortune (cookie jar payoff ceremony)
  OBS Browser Source: 1920 × 1080, transparent background.
  Connects to ws://localhost:8766/ws/overlays
  Events: wheel_spin · wheel_veto · overlay_vis
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1920px; height: 1080px;
  background: transparent;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, sans-serif;
  user-select: none;
}
#fx-canvas {
  position: absolute; inset: 0;
  width: 1920px; height: 1080px;
  pointer-events: none;
  z-index: 5;
}
#wheel-root {
  position: absolute;
  left: 50%; top: 52%;
  transform: translate(-50%, -50%) scale(0.92);
  pointer-events: none;
  opacity: 0;
  transition: opacity 450ms ease, transform 450ms cubic-bezier(.34,1.56,.64,1);
  z-index: 10;
}
#wheel-root.visible { opacity: 1; }
#wheel-root.pop     { transform: translate(-50%, -50%) scale(1); }
#title-banner {
  position: absolute;
  left: 50%; top: -112px;
  transform: translateX(-50%) rotate(-1.4deg);
  padding: 11px 32px 13px;
  background: linear-gradient(180deg, #fdf4e3 0%, #f6e7cd 100%);
  border: 2.5px solid #8b6040;
  border-radius: 8px;
  box-shadow: 0 8px 22px rgba(74,46,48,0.28), inset 0 1px 0 rgba(255,255,255,0.7);
  text-align: center;
  white-space: nowrap;
}
#title-banner::before,
#title-banner::after {
  content: '';
  position: absolute; top: -11px;
  width: 60px; height: 24px;
  background: rgba(184,122,142,0.45);
  border: 1px solid rgba(139,96,64,0.35);
}
#title-banner::before { left: 16px;  transform: rotate(-8deg); }
#title-banner::after  { right: 16px; transform: rotate( 7deg); }
#title-banner .t-main {
  font-size: 32px; font-weight: 900;
  letter-spacing: 0.10em; text-transform: uppercase;
  color: #4a2e30; line-height: 1;
  text-shadow: 0 1px 0 rgba(255,255,255,0.7);
}
#title-banner .t-sub {
  margin-top: 5px;
  font-size: 15px; font-weight: 700;
  letter-spacing: 0.04em;
  color: #8b5a4a;
  min-height: 18px;
}
#title-banner .t-sub b { color: #b03a52; }
#pointer {
  position: absolute;
  left: 50%; top: 0;
  transform: translate(-50%, -16px);
  z-index: 14;
  filter: drop-shadow(0 3px 5px rgba(0,0,0,0.32));
}
@keyframes win-pulse {
  0%,100% { filter: drop-shadow(0 12px 24px rgba(74,46,48,0.30)); }
  50%     { filter: drop-shadow(0 0 32px rgba(255,205,90,0.9)) drop-shadow(0 12px 24px rgba(74,46,48,0.30)); }
}
#wheel-canvas { filter: drop-shadow(0 12px 24px rgba(74,46,48,0.30)); }
#wheel-canvas.win-glow { animation: win-pulse 0.9s ease-in-out infinite; }
#result-label {
  position: absolute;
  left: 50%; top: calc(100% + 4px);
  transform: translateX(-50%) translateY(10px);
  padding: 11px 28px;
  background: linear-gradient(180deg, #fff8ef 0%, #f7e8d0 100%);
  border: 2.5px solid #8b6040;
  border-radius: 12px;
  box-shadow: 0 10px 24px rgba(74,46,48,0.30), inset 0 1px 0 rgba(255,255,255,0.7);
  font-size: 36px;
  font-weight: 900;
  color: #4a2e30;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  text-shadow: 0 1px 0 rgba(255,255,255,0.7);
  white-space: nowrap;
  text-align: center;
  opacity: 0;
  transition: opacity 400ms ease, transform 400ms cubic-bezier(.34,1.56,.64,1);
}
#result-label.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
#result-label .rl-kicker {
  display: block;
  font-size: 14px; font-weight: 800;
  letter-spacing: 0.18em;
  color: #b87a8e;
  margin-bottom: 3px;
}
</style>
</head>
<body>

<canvas id="fx-canvas" width="1920" height="1080"></canvas>

<div id="wheel-root">
  <div id="title-banner">
    <div class="t-main">The Wheel</div>
    <div class="t-sub" id="title-sub">of Fortune</div>
  </div>
  <canvas id="wheel-canvas"></canvas>
  <svg id="pointer" width="44" height="56" viewBox="0 0 44 56">
    <circle cx="22" cy="14" r="12" fill="#fff8f0" stroke="#8b6040" stroke-width="3"/>
    <path d="M22 25 L10 28 Q22 56 34 28 Z" fill="#b03a52" stroke="#8b6040" stroke-width="2.5"/>
    <path d="M10 28 Q22 56 34 28 L22 31 Z" fill="#8b2a40"/>
  </svg>
  <div id="result-label"><span class="rl-kicker">The wheel says</span><span id="result-text"></span></div>
</div>

<script>
const SLICES = [
  { id: 'ghost_story',        label: 'Ghost Story',       tier: 'common',   color: '#f5e6d0', textColor: '#4a2e30' },
  { id: 'roast_round',        label: 'Roast Round',       tier: 'common',   color: '#f0d8d0', textColor: '#4a2e30' },
  { id: 'hot_takes_gauntlet', label: 'Hot Takes',         tier: 'common',   color: '#e8d8c0', textColor: '#4a2e30' },
  { id: 'chaos_mode',         label: 'CHAOS MODE',        tier: 'common',   color: '#f0c8b8', textColor: '#8b2010' },
  { id: 'lore_drop',          label: 'Lore Drop',         tier: 'uncommon', color: '#d8e0f0', textColor: '#2030a0' },
  { id: 'interrogation',      label: 'Interrogation',     tier: 'uncommon', color: '#d8f0e0', textColor: '#105030' },
  { id: 'duchess_challenge',  label: 'Duchess',           tier: 'uncommon', color: '#e8d0f0', textColor: '#501080' },
  { id: 'confession_booth',   label: 'Confession Booth',  tier: 'rare',     color: '#f0e0a0', textColor: '#604000' },
  { id: 'kira_sings',         label: 'Kira Sings',        tier: 'rare',     color: '#fcd8e8', textColor: '#8b1060' },
  { id: 'chats_choice',       label: "Chat's Choice",     tier: 'rare',     color: '#f8f0c0', textColor: '#604000' },
];

const TIER_RING = { common: '#c8a880', uncommon: '#9090d0', rare: '#d0a020' };

const R       = 320;
const R_INNER = 38;
const PAD     = 44;
const CANVAS_SIZE = (R + PAD) * 2;

const $root    = document.getElementById('wheel-root');
const $canvas  = document.getElementById('wheel-canvas');
const $result  = document.getElementById('result-label');
const $resultT = document.getElementById('result-text');
const $titleSub= document.getElementById('title-sub');
const ctx      = $canvas.getContext('2d');

$canvas.width  = CANVAS_SIZE;
$canvas.height = CANVAS_SIZE;
$root.style.width  = CANVAS_SIZE + 'px';
$root.style.height = CANVAS_SIZE + 'px';

const CX = CANVAS_SIZE / 2;
const CY = CANVAS_SIZE / 2;
const N  = SLICES.length;
const SLICE_ANGLE = (2 * Math.PI) / N;

function _wobbleR(baseR, angle) {
  return baseR * (1 + 0.010 * Math.sin(angle * 3.7 + 0.9));
}

function drawWheel(rot, winIdx) {
  ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

  ctx.beginPath(); ctx.arc(CX, CY, R + 24, 0, Math.PI * 2);
  ctx.fillStyle = '#f3e3c8'; ctx.fill();
  ctx.lineWidth = 6; ctx.strokeStyle = '#8b6040'; ctx.stroke();
  ctx.beginPath(); ctx.arc(CX, CY, R + 9, 0, Math.PI * 2);
  ctx.lineWidth = 3; ctx.strokeStyle = '#c8a880'; ctx.stroke();

  for (let i = 0; i < N; i++) {
    const startA = rot + i * SLICE_ANGLE - Math.PI / 2;
    const endA   = startA + SLICE_ANGLE;
    const s      = SLICES[i];
    const isWin  = (winIdx === i);

    ctx.beginPath();
    ctx.moveTo(CX, CY);
    for (let a = startA; a <= endA + 0.01; a += 0.04) {
      const r = _wobbleR(R, a);
      ctx.lineTo(CX + Math.cos(a) * r, CY + Math.sin(a) * r);
    }
    ctx.closePath();
    const baseCol = isWin ? _lighten(s.color, 0.22) : s.color;
    const grad = ctx.createRadialGradient(CX, CY, R_INNER, CX, CY, R);
    grad.addColorStop(0, _lighten(baseCol, 0.30));
    grad.addColorStop(1, baseCol);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.strokeStyle = isWin ? '#ffcf5a' : (TIER_RING[s.tier] || '#c8a880');
    ctx.lineWidth   = isWin ? 5 : 2.5;
    ctx.stroke();

    const midA  = startA + SLICE_ANGLE / 2;
    const tr    = R * 0.62;
    const tx    = CX + Math.cos(midA) * tr;
    const ty    = CY + Math.sin(midA) * tr;
    ctx.save();
    ctx.translate(tx, ty);
    const fontSize  = 22;
    ctx.font        = '900 ' + fontSize + "px 'Segoe UI', sans-serif";
    ctx.textAlign   = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineWidth   = 4;
    ctx.lineJoin    = 'round';
    ctx.strokeStyle = 'rgba(255,255,255,0.90)';
    ctx.fillStyle   = s.textColor;
    const words = s.label.split(' ');
    const lines = (words.length === 1)
      ? [s.label]
      : [words.slice(0, Math.ceil(words.length/2)).join(' '),
         words.slice(Math.ceil(words.length/2)).join(' ')];
    lines.forEach((ln, li) => {
      const yy = (li - (lines.length - 1) / 2) * (fontSize + 3);
      ctx.strokeText(ln, 0, yy);
      ctx.fillText(ln, 0, yy);
    });
    ctx.restore();
  }

  for (let i = 0; i < N; i++) {
    const a = rot + i * SLICE_ANGLE - Math.PI / 2;
    const px = CX + Math.cos(a) * (R + 1);
    const py = CY + Math.sin(a) * (R + 1);
    ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff8f0'; ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = '#8b6040'; ctx.stroke();
  }

  ctx.beginPath(); ctx.arc(CX, CY, R_INNER + 6, 0, Math.PI * 2);
  ctx.fillStyle = '#f3e3c8'; ctx.fill();
  ctx.lineWidth = 3; ctx.strokeStyle = '#8b6040'; ctx.stroke();
  ctx.beginPath(); ctx.arc(CX, CY, R_INNER, 0, Math.PI * 2);
  ctx.fillStyle = '#fff8f0'; ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = '#c8a880'; ctx.stroke();
  _drawPixelHeart(ctx, CX, CY, 6, '#b87a8e');
}

function _lighten(col, amt) {
  let r, g, b;
  if (col[0] === '#') {
    r = parseInt(col.slice(1,3), 16);
    g = parseInt(col.slice(3,5), 16);
    b = parseInt(col.slice(5,7), 16);
  } else {
    const m = col.match(/(\d+)\D+(\d+)\D+(\d+)/);
    if (!m) return col;
    r = +m[1]; g = +m[2]; b = +m[3];
  }
  const lr = Math.min(255, Math.round(r + (255-r)*amt));
  const lg = Math.min(255, Math.round(g + (255-g)*amt));
  const lb = Math.min(255, Math.round(b + (255-b)*amt));
  return 'rgb(' + lr + ',' + lg + ',' + lb + ')';
}

function _drawPixelHeart(ctx, cx, cy, px, color) {
  const HEART = [
    [0,1],[0,2],[0,4],[0,5],
    [1,0],[1,1],[1,2],[1,3],[1,4],[1,5],[1,6],
    [2,0],[2,1],[2,2],[2,3],[2,4],[2,5],[2,6],
    [3,1],[3,2],[3,3],[3,4],[3,5],
    [4,2],[4,3],[4,4],
    [5,3],
  ];
  const ox = cx - 3.5 * px;
  const oy = cy - 3 * px;
  ctx.fillStyle = color;
  for (const [r, c] of HEART) {
    ctx.fillRect(ox + c * px, oy + r * px, px - 1, px - 1);
  }
}

const $fx = document.getElementById('fx-canvas');
const fxc = $fx.getContext('2d');
let _confetti = [];
let _fxRAF = null;
const CONF_COLORS = ['#b87a8e', '#f0c8b8', '#d0a020', '#9090d0', '#f5e6d0', '#b03a52'];

function burstConfetti() {
  const cx = 1920 / 2, cy = 1080 * 0.52;
  for (let i = 0; i < 80; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 6 + Math.random() * 12;
    _confetti.push({
      x: cx, y: cy,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd - 7,
      g: 0.28 + Math.random() * 0.15,
      size: 7 + Math.random() * 8,
      rot: Math.random() * Math.PI,
      vr: (Math.random() - 0.5) * 0.3,
      color: CONF_COLORS[(Math.random() * CONF_COLORS.length) | 0],
      heart: Math.random() < 0.5,
      life: 0, ttl: 95 + Math.random() * 45,
    });
  }
  if (!_fxRAF) _fxRAF = requestAnimationFrame(_fxFrame);
}

function _fxFrame() {
  fxc.clearRect(0, 0, 1920, 1080);
  for (const p of _confetti) {
    p.life++;
    p.vy += p.g;
    p.x += p.vx; p.y += p.vy;
    p.rot += p.vr;
    const alpha = Math.max(0, 1 - p.life / p.ttl);
    fxc.save();
    fxc.globalAlpha = alpha;
    fxc.translate(p.x, p.y);
    fxc.rotate(p.rot);
    if (p.heart) {
      _drawPixelHeart(fxc, 0, 0, p.size / 6, p.color);
    } else {
      fxc.fillStyle = p.color;
      fxc.fillRect(-p.size/2, -p.size/2, p.size, p.size);
    }
    fxc.restore();
  }
  _confetti = _confetti.filter(p => p.life < p.ttl && p.y < 1180);
  if (_confetti.length) {
    _fxRAF = requestAnimationFrame(_fxFrame);
  } else {
    fxc.clearRect(0, 0, 1920, 1080);
    _fxRAF = null;
  }
}

/* ══════════════════════════════════════════════════════════════════════
   CEREMONY TIMING (all tunable — durations in ms)
   Total on-screen ≈ entranceMs + spinMs + holdMs + resultMs
══════════════════════════════════════════════════════════════════════ */
const CFG = {
  entranceMs: 1800,   // anticipation hold after appearing, before the spin
  spinMs:     6000,   // spin duration (strong ease-out, teases past slices)
  holdMs:     4500,   // land hold: glow pulse + confetti before the result card
  resultMs:   5500,   // result card ("The wheel says…") on-screen time
};

let _spinRAF = null;
let _winIdx  = -1;
let _visible = { wheel: true };

function _sliceIdxToAngle(idx) {
  // Land slice `idx` directly under the TOP pointer (12 o'clock = canvas angle
  // -π/2). drawWheel() places slice i's midpoint at rot + i*SLICE_ANGLE +
  // SLICE_ANGLE/2 - π/2, so solving midpoint = -π/2 gives this rotation. The
  // previous formula carried an extra -π/2, landing the winner at 9 o'clock
  // while the pointer read a different slice — the "announced ≠ landed" bug.
  return -idx * SLICE_ANGLE - SLICE_ANGLE / 2;
}

function spin(sliceId, durationMs, onFinish) {
  if (_spinRAF) cancelAnimationFrame(_spinRAF);
  $canvas.classList.remove('win-glow');
  _winIdx = SLICES.findIndex(s => s.id === sliceId);
  if (_winIdx < 0) _winIdx = 0;

  const targetRot  = _sliceIdxToAngle(_winIdx);
  const FULL_SPINS = 6 + Math.random() * 2;   // more revolutions for drama
  const startRot   = 0;
  const totalDelta = FULL_SPINS * Math.PI * 2 + _normalise(targetRot - startRot);
  const startTime  = performance.now();

  /* Strong ease-out — slow, teasing deceleration near the end. */
  function _easeOut(t) { return 1 - Math.pow(1 - t, 6); }

  function frame(now) {
    const t   = Math.min(1, (now - startTime) / durationMs);
    let   et  = _easeOut(t);
    /* Damped settle wobble in the final stretch — overshoots a hair past
       the slice then rocks back, for the "is it gonna land on—" tension. */
    if (t > 0.80 && t < 1) {
      const k = (t - 0.80) / 0.20;            // 0→1 across the last 20%
      et += Math.sin(k * Math.PI * 2.5) * (1 - k) * 0.010;
    }
    const rot = startRot + totalDelta * et;
    drawWheel(rot % (Math.PI * 2), t >= 1 ? _winIdx : -1);
    if (t < 1) {
      _spinRAF = requestAnimationFrame(frame);
    } else {
      drawWheel(targetRot % (Math.PI * 2), _winIdx);
      $canvas.classList.add('win-glow');
      burstConfetti();
      if (onFinish) onFinish();
    }
  }
  _spinRAF = requestAnimationFrame(frame);
}

function _normalise(a) {
  while (a < 0) a += Math.PI * 2;
  while (a > Math.PI * 2) a -= Math.PI * 2;
  return a;
}

function _esc(s) {
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

function showWheel(tipper) {
  $titleSub.innerHTML = tipper
    ? '<b>' + _esc(tipper) + '</b> filled the jar!'
    : 'of Fortune';
  $root.classList.add('visible');
  requestAnimationFrame(() => $root.classList.add('pop'));
}
function hideWheel() {
  if (typeof _clearCeremony === 'function') _clearCeremony();
  $root.classList.remove('visible', 'pop');
  $result.classList.remove('visible');
  $resultT.textContent = '';
  $canvas.classList.remove('win-glow');
  if (_spinRAF) { cancelAnimationFrame(_spinRAF); _spinRAF = null; }
  _confetti = [];
  _winIdx = -1;
  drawWheel(0, -1);
}

drawWheel(0, -1);

const WS_URL    = 'ws://localhost:8766/ws/overlays';
const RECONNECT = 3000;

/* Pending ceremony timers — cleared on veto / new spin / hide. */
let _ceremony = [];
function _clearCeremony() {
  for (const id of _ceremony) clearTimeout(id);
  _ceremony = [];
}

function connect() {
  let ws;
  try { ws = new WebSocket(WS_URL); } catch { setTimeout(connect, RECONNECT); return; }

  ws.onmessage = function (ev) {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }

    if (msg.type === 'overlay_vis') {
      if (typeof msg.wheel === 'boolean') _visible.wheel = msg.wheel;
      if (!_visible.wheel) hideWheel();
      return;
    }

    if (!_visible.wheel) return;

    if (msg.type === 'wheel_spin') {
      _clearCeremony();
      $result.classList.remove('visible');
      $resultT.textContent = '';

      const sliceId = msg.result || 'ghost_story';
      const label   = msg.label || '';

      /* PHASE 1 — ENTRANCE: fade/scale in, then hold for anticipation. */
      showWheel(msg.tipper || '');

      _ceremony.push(setTimeout(function () {
        /* PHASE 2 — SPIN: long, dramatic, strong ease-out. */
        spin(sliceId, CFG.spinMs, function () {
          /* PHASE 3 — LAND: glow pulse + confetti already firing; hold so the
             slice reads clearly and Kira can react. Re-burst confetti midway
             so it doesn't die out during the long hold. */
          _ceremony.push(setTimeout(burstConfetti, Math.round(CFG.holdMs * 0.45)));

          _ceremony.push(setTimeout(function () {
            /* PHASE 4 — RESULT CARD: "The wheel says…" holds, then fades. */
            $resultT.textContent = label;
            $result.classList.add('visible');
            _ceremony.push(setTimeout(hideWheel, CFG.resultMs));
          }, CFG.holdMs));
        });
      }, CFG.entranceMs));
    }

    if (msg.type === 'wheel_veto') {
      _clearCeremony();
      hideWheel();
    }
  };

  ws.onclose = function () { setTimeout(connect, RECONNECT); };
  ws.onerror = function () { ws.close(); };
}

connect();
</script>
</body>
</html>
